name: Keep Render awake

# Pings /healthz/ to keep the Render free-tier service warm during active hours.
# Key difference vs cron-job.org: curl --retry rides through the ~50s cold start
# within a single run, so a sleeping service gets woken instead of being marked
# failed and backed off (the 503 death-spiral). cron-job.org stays as a backup.

on:
  schedule:
    # Every 10 min, 07:00–22:59 UTC. GitHub Actions cron is UTC-only (no DST),
    # so this covers ~09:00–00:59 CEST (summer) / ~08:00–23:59 CET (winter),
    # i.e. the requested 09:00–24:00 CET window. Off overnight to stay well
    # under Render's 750h/month free cap (~16h/day ≈ 480-500h/month).
    - cron: '*/10 7-22 * * *'
  workflow_dispatch: {}

# Don't let slow cold-start runs pile up on top of each other.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /healthz/ (retry through cold start)
        run: |
          curl -fsS \
            --retry 6 \
            --retry-delay 30 \
            --retry-all-errors \
            --max-time 120 \
            -o /dev/null \
            -w 'HTTP %{http_code} in %{time_total}s\n' \
            https://stravagancia.onrender.com/healthz/
