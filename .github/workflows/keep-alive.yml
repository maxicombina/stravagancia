name: Keep Render awake

# Pings /healthz/ to keep the Render free-tier service warm during active hours.
# Key difference vs cron-job.org: curl --retry rides through the ~50s cold start
# within a single run, so a sleeping service gets woken instead of being marked
# failed and backed off (the 503 death-spiral). cron-job.org stays as a backup.

on:
  schedule:
    # Every 10 min, 06:00–21:59 UTC. GitHub Actions cron is UTC-only (no DST),
    # so this is tuned for SUMMER (CEST, UTC+2) = 08:00–23:50 local Spain.
    # In WINTER (CET, UTC+1) it shifts to 07:00–22:50 local — switch back to
    # '7-22' around late October if you want 08:00–23:50 in winter too.
    # Off overnight to stay well under Render's 750h/month free cap.
    - cron: '*/10 6-21 * * *'
  workflow_dispatch: {}

# Don't let slow cold-start runs pile up on top of each other.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /healthz/ (retry through cold start)
        run: |
          curl -fsS \
            --retry 6 \
            --retry-delay 30 \
            --retry-all-errors \
            --max-time 120 \
            -o /dev/null \
            -w 'HTTP %{http_code} in %{time_total}s\n' \
            https://stravagancia.onrender.com/healthz/
