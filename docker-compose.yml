services:
  postgres:
    image: postgres:16
    container_name: stravagancia_db
    environment:
      POSTGRES_DB: stravagancia
      POSTGRES_USER: strava
      POSTGRES_PASSWORD: strava
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_strava
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_HOST: 0.0.0.0
      MB_JETTY_PORT: 3000
    volumes:
      - ./metabase-data:/metabase-data
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
