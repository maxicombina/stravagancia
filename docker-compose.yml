services:
  postgres:
    image: postgres:16
    container_name: stravagancia_db
    environment:
      POSTGRES_DB: stravagancia
      POSTGRES_USER: strava
      POSTGRES_PASSWORD: strava
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  django:
    build: .
    container_name: stravagancia_django
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point django at the production Neon DB (takes precedence over DB_* vars in settings.py)
      DATABASE_URL: postgresql://neondb_owner:${NEON_PASSWORD}@ep-wild-sky-al1wjejk.c-3.eu-central-1.aws.neon.tech:5432/neondb?sslmode=require
      # Don't create a superuser against prod Neon on startup
      SKIP_SUPERUSER: "1"
    volumes:
      # Mount source code for hot reload during development
      - .:/app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    container_name: stravagancia_grafana
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      # Day/month date format on time axes (Grafana default is US MM/DD)
      GF_DATE_FORMATS_INTERVAL_MINUTE: "HH:mm"
      GF_DATE_FORMATS_INTERVAL_HOUR: "DD/MM HH:mm"
      GF_DATE_FORMATS_INTERVAL_DAY: "DD/MM"
      GF_DATE_FORMATS_INTERVAL_MONTH: "MM/YYYY"
      GF_DATE_FORMATS_INTERVAL_YEAR: "YYYY"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_strava
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_HOST: 0.0.0.0
      MB_JETTY_PORT: 3000
    volumes:
      - ./metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
