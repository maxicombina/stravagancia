services:
  postgres:
    image: postgres:16
    container_name: stravagancia_db
    environment:
      POSTGRES_DB: stravagancia
      POSTGRES_USER: strava
      POSTGRES_PASSWORD: strava
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  django:
    build: .
    container_name: stravagancia_django
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DB_HOST to use the postgres service name instead of localhost
      DB_HOST: postgres
      # Superuser created on first startup if it doesn't exist
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin
      DJANGO_SUPERUSER_EMAIL: ""
    volumes:
      # Mount source code for hot reload during development
      - .:/app
    depends_on:
      - postgres
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    container_name: stravagancia_grafana
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_strava
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_HOST: 0.0.0.0
      MB_JETTY_PORT: 3000
    volumes:
      - ./metabase-data:/metabase-data
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
  grafana_data:
