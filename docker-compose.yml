services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_strava
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_HOST: 0.0.0.0
      MB_JETTY_PORT: 3000
    volumes:
      - ./metabase-data:/metabase-data
      - ./db.sqlite3:/app/db.sqlite3:ro
    restart: unless-stopped
