<h1>Activities</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Start time</th>
      <th>Distance</th>
    </tr>
  </thead>
  <tbody>
    {% for a in activities %}
    <tr>
      <td>{{ a.strava_id }}</td>
      <td>{{ a.name }}</td>
      <td>{{ a.start_date_local }}</td>
      <td>{{ a.distance_km }}km</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3">No activities</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
