<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stravagancia Charts</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div class="max-w-7xl mx-auto p-6">

      <header class="mb-6 flex items-center justify-between">
        <div>
          <a href="{% url 'dashboard' %}" class="text-sm text-gray-400 hover:text-gray-600 mb-1 block">← Dashboard</a>
          <h1 class="text-3xl font-semibold">Charts</h1>
          <p class="text-sm text-gray-500">Strava — Weekly</p>
        </div>
        <a href="{{ grafana_url }}/d/{{ dashboard_uid }}" target="_blank"
           class="px-4 py-2 bg-white rounded shadow text-sm text-indigo-600 hover:bg-indigo-50 transition-colors">
          Open in Grafana ↗
        </a>
      </header>

      <div class="bg-white rounded shadow overflow-hidden">
        <iframe
          src="{{ grafana_url }}/d/{{ dashboard_uid }}?kiosk&theme=light"
          width="100%" style="height: calc(100vh - 140px); border: 0;">
        </iframe>
      </div>

    </div>
  </body>
</html>
